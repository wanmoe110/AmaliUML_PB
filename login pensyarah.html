<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk Sistem Kokurikulum</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h2>Sistem Pendaftaran Aktiviti Kelab Kolej </h2>
        <h1>Log Masuk</h1>
        <form>
            <div class="input-group">
                <label for="username">ID Pensyarah</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Kata Laluan</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Ingat saya</label>
            </div>
            <button type="submit" class="login-button">Log Masuk</button>
        </form>
        <p class="forgot-password"><a href="#">Lupa kata laluan?</a></p>
    </div>
</body>
</html>
